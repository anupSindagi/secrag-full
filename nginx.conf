# Nginx configuration for Secrag / Aegra App
# Proxies requests to the Docker container running on localhost:8000

upstream aegra_backend {
    # Docker container exposed to host port 8000
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;  # Default catch-all

    # Logging
    access_log /var/log/nginx/secrag_access.log;
    error_log /var/log/nginx/secrag_error.log;

    # Maximum upload size
    client_max_body_size 100M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Main proxy location
    location / {
        proxy_pass http://aegra_backend;
        proxy_http_version 1.1;

        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Health check
    location /health {
        proxy_pass http://aegra_backend/health;
        access_log off;
    }
}
